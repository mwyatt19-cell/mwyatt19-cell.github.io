<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
   <h1 id="title">Page Title</h1>
    <p id="description">Here is the page description</p>
  
    <form id="survey-form">

      <label 
      for="text"          id="name-label"
      >Name</label>
      <input 
      id="name" 
      type="text"
     placeholder="Jane M Doe"
     required/>

      <label 
      for="email" 
      id="email-label"> 
      Email</label>
      <input
       id="email" 
       type="email"
       placeholder="example@email.com"/
       required >
        <label 
      for="number" 
      id="number-label"> 
      Number</label>
      <input
       id="number" 
       type="number"
       placeholder=1234567890
       required
       min="0" 
       max="9999999999">
      <select
      id="dropdown">
      <option> Yes</option>
      <option> No</option>
      </select>


     <fieldset>
       <legend>Answer Question</legend>
       <label for="of-course">Of Course</label>
       <input id="of-course" type="radio" value="ofCourse" name="form question"/>

      <label for="no-way">No Way</label>
    <input id="no-way" type="radio" value="noWay" name="form question"/>
      </fieldset>
    <legend> Checkbox Question</legend>
    <label for="in-a-group">In a group</label>
    <input
    id="in-a-group"
    type="checkbox"
    name="in-a-group"
    value="in-a-group"/>
     <label for="alone">Alone</label>
    <input
    id="alone"
    type="checkbox"
    name="alone"
    value="in-a-group"/>
  <textarea ></textarea>
   <button id="submit">Submit</button>
    </form>
  </body>
</html>
