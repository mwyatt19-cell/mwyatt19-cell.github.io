<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introduction Form</title>
    <script
      src="https://lint.page/kit/4d0fe3.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <main>
      <div data-include="components/header.html"></div>

      <h2>Introduction Form</h2>
      <h3>Please submit the form below.</h3>

      <form id="form">
        <!-- Basic Personal Information -->
        <fieldset>
          <legend>Basic Personal Information</legend>

          <label for="first-name">First Name:</label>
          <input
            id="first-name"
            type="text"
            required
            value="Alex"
            data-default="Alex"
            placeholder="First Name"
          />

          <label for="middle-name">Middle Name (optional):</label>
          <input
            id="middle-name"
            type="text"
            value="C"
            data-default="C"
            placeholder="Middle Name (optional)"
          />

          <label for="nickname">Nickname (optional):</label>
          <input
            id="nickname"
            type="text"
            value="Alex"
            data-default="Alex"
            placeholder="Nickname (optional)"
          />

          <label for="last-name">Last Name:</label>
          <input
            id="last-name"
            type="text"
            required
            value="Wyatt"
            data-default="Wyatt"
            placeholder="Last Name"
          />
        </fieldset>

        <!-- Acknowledgement -->
        <fieldset>
          <legend>Acknowledgement</legend>

          <p>I understand that what I put here is publicly available...</p>

          <label for="acknowledgement">Initials:</label>
          <input
            id="acknowledgement"
            type="text"
            required
            value="ACW"
            data-default="ACW"
            placeholder="Initials"
          />

          <label for="ack-date">Date:</label>
          <input
            id="ack-date"
            type="date"
            required
            value="2026-01-12"
            data-default="2026-01-12"
          />
        </fieldset>

        <!-- Mascot -->
        <fieldset>
          <legend>Mascot</legend>

          <label for="adj">Adjective:</label>
          <input
            id="adj"
            type="text"
            required
            value="Adventurous"
            data-default="Adventurous"
            placeholder="Adjective"
          />

          <label for="animal">Animal:</label>
          <input
            id="animal"
            type="text"
            required
            value="Walrus"
            data-default="Walrus"
            placeholder="Animal"
          />

          <label for="divider">Divider:</label>
          <input
            id="divider"
            type="text"
            required
            value="|"
            data-default="|"
            placeholder="Divider"
          />
        </fieldset>

        <!-- Image -->
        <fieldset>
          <legend>Image</legend>

          <label for="image">Upload Image:</label>
          <input id="image" type="file" accept="image/*" />

          <label for="caption">Caption:</label>
          <input
            id="caption"
            type="text"
            value="Me playing field hockey"
            data-default="Me playing field hockey"
            placeholder="Caption"
          />
        </fieldset>

        <!-- Personal Statement -->
        <fieldset>
          <legend>Personal Statement</legend>
          <textarea
            id="statement"
            required
            data-default="I’m a junior at UNCC double majoring in Latin-American Studies..."
            placeholder="Personal Statement"
          >
I’m a junior at UNCC double majoring in Latin-American Studies...</textarea
          >
        </fieldset>

        <!-- Backgrounds -->
        <fieldset>
          <legend>Background Info</legend>

          <label for="personal-bg">Personal Background:</label>
          <input
            id="personal-bg"
            type="text"
            required
            value="I’m a 19 year old..."
            data-default="I’m a 19 year old..."
            placeholder="Personal Background"
          />

          <label for="professional-bg">Professional Background:</label>
          <input
            id="professional-bg"
            type="text"
            required
            value="I am a Co-LAB Navigator Intern..."
            data-default="I am a Co-LAB Navigator Intern..."
            placeholder="Professional Background"
          />

          <label for="academic-bg">Academic Background:</label>
          <input
            id="academic-bg"
            type="text"
            required
            value="UNCC junior in LTAM..."
            data-default="UNCC junior in LTAM..."
            placeholder="Academic Background"
          />

          <label for="subject-bg">Background in this Subject:</label>
          <textarea
            id="subject-bg"
            required
            data-default="I have little experience in Web Development..."
            placeholder="Background in this Subject"
          >
I have little experience in Web Development...</textarea
          >

          <label for="primary-platform">Primary Work Computer:</label>
          <textarea
            id="primary-platform"
            required
            data-default="The laptop I use for university is a Lenovo ThinkPad Desktop."
            placeholder="Primary Work Computer"
          >
The laptop I use for university is a Lenovo ThinkPad Desktop.</textarea
          >

          <label for="background-platform"
            >Backup Work Computer & Location Plan:</label
          >
          <textarea
            id="background-platform"
            required
            data-default="My backup computer is a loan computer from Atkins Library."
            placeholder="Backup Work Computer & Location Plan"
          >
My backup computer is a loan computer from Atkins Library.</textarea
          >
        </fieldset>

        <!-- Courses -->
        <fieldset>
          <legend>Courses</legend>

          <div id="courses-container">
            <input
              type="text"
              value="ITIS3135 - Front-End..."
              data-default="ITIS3135 - Front-End..."
              required
              placeholder="Course and Reason"
            />
          </div>

          <button type="button" id="add-course">Add Course</button>
        </fieldset>

        <!-- Quote -->
        <fieldset>
          <legend>Quote</legend>

          <label for="quote">Quote:</label>
          <input
            id="quote"
            type="text"
            value="We learn from failure, not from success!"
            data-default="We learn from failure, not from success!"
            required
            placeholder="Quote"
          />

          <label for="quote-author">Author:</label>
          <input
            id="quote-author"
            type="text"
            value="Bram Stoker"
            data-default="Bram Stoker"
            required
            placeholder="Author"
          />
        </fieldset>

        <!-- Links -->
        <fieldset>
          <legend>Links</legend>

          <input
            id="clt-web"
            type="url"
            value="https://webpages.charlotte.edu/mwyatt19/"
            data-default="https://webpages.charlotte.edu/mwyatt19/"
            required
            placeholder="CLT Web"
          />
          <input
            id="github-io"
            type="url"
            value="https://mwyatt19-cell.github.io/"
            data-default="https://mwyatt19-cell.github.io/"
            required
            placeholder="GitHub Pages"
          />
          <input
            id="github"
            type="url"
            value="https://github.com/mwyatt19-cell/"
            data-default="https://github.com/mwyatt19-cell/"
            required
            placeholder="GitHub"
          />
          <input
            id="free-code-camp"
            type="url"
            value="https://www.freecodecamp.org/alex12417093"
            data-default="https://www.freecodecamp.org/alex12417093"
            required
            placeholder="FreeCodeCamp"
          />
          <input
            id="linked-in"
            type="url"
            value="https://www.linkedin.com/in/alex-wyatt-a95b69301"
            data-default="https://www.linkedin.com/in/alex-wyatt-a95b69301"
            required
            placeholder="LinkedIn"
          />
        </fieldset>

        <!-- Optional Fields -->
        <fieldset>
          <legend>Extras</legend>

          <label for="funny">Funny/Interesting item (optional):</label>
          <input id="funny" type="text" placeholder="Funny/Interesting item" />

          <label for="extra">Something I’d like to share (optional):</label>
          <input
            id="extra"
            type="text"
            placeholder="Something I’d like to share"
          />
        </fieldset>

        <!-- Buttons -->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        <button type="button" id="clear-btn">Clear</button>
      </form>

      <div id="output"></div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/form.js"></script>
  </body>
</html>
