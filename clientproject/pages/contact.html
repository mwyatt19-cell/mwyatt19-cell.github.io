<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../styles/default.css">
    <title>Contact Us - Paws &amp; Hearts Animal Shelter</title>
</head>

<body>
    <div data-include="../components/header.html"></div>
    <div class="page-layout">
        <div data-include="../components/navbar.html"></div>
        <main>
            <form class="contact-form">
                <h1>Contact Us</h1>
                <p>Have questions, want to volunteer, or need to report a lost/found pet? Reach out to us!</p>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required placeholder="Susan Rodriguez"><br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required placeholder="susan@example.com"><br>
                <label for="subject">Subject of Message:</label><br>
                <input type="checkbox" id="subject" name="subject"> Volunteer Opportunities<br>
                <input type="checkbox" id="subject" name="subject"> Lost/Found Pet Report<br>
                <input type="checkbox" id="subject" name="subject"> General Inquiry<br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" required
                    placeholder="How can we help you?"></textarea><br>
                <button type="submit">Submit</button>
            </form>
            <div class="site-info">
                <p><strong>Address:</strong> 1234 Paws Street, Anytown, USA</p>
                <p><strong>Phone:</strong> (555) 123-4567</p>
                <p><strong>Email:</strong> info@pawsandhearts.org</p>
            </div>
        </main>
    </div>

    <div data-include=" ../components/footer.html"></div>
    <script src="../scripts/HTMLInclude.min.js"></script>
</body>

</html>
<!--Purpose of the page: Allow visitors to reach the shelter for inquiries, volunteering, or reporting lost/found pets.
Audience/Users of the page: General public, potential adopters, donors, volunteers.
Content of the page: Contact form (name, email, message), shelter address, phone number, email, map embed (optional).
User data entry: Name, email, message.
Data validation: Validate email format and required fields (name, message).
Buttons/links/drop-downs: Submit button for form, navigation menu links.
Actions on the page: Navigation links take users to other pages.-->
